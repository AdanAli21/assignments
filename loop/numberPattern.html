<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input placeholder="enter number"id="number" >
    <button id="pattern">show pattern</button>]
    <div id="table"></div>
</body>
<script>
let NUMBER=document.getElementById("number")
let btn=document.getElementById("pattern")
let div=document.getElementById("table")
let counting = () => {
    let number = Number(NUMBER.value);

    div.innerHTML = "";

    for (let x = 1; x <= number; x++) {

        let pattern = "";

        for (let y = 1; y <= x; y++) {
            pattern += y;
        }

        div.innerHTML += "<p>" + pattern + "</p>";
    }
}
btn.addEventListener("click", counting)


</script>
</html>
